<!doctype html>
    <html lang="en">
        <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1"/>
            <link rel="stylesheet" type="text/css" href="style.css">
            <title>Worn Well</title>

            <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
            <meta http-equiv="Pragma" content="no-cache" />
            <meta http-equiv="Expires" content="0" />
            
            <!-- links to Adobe Fonts -->
            <link rel="stylesheet" href="https://use.typekit.net/muy3hit.css">
        </head>

        <body>
            <div class="gallery-container">
            
                <header>
                    <h1>
                        <a href="index.html"><img src="WornWellLogo.svg" alt="Worn Well logo"></a>
                    </h1>

                    <nav>
                        <ul>
                            <li><a href="#">Editorial</a></li>
                            <li><a href="#">Vintage</a></li>
                            <li><a href="#">Sustainability</a></li>
                            <li><a href="#">Features</a></li>
                            <li><a href="#">About</a></li>
                            <li><a href="newsletter.html">Subscribe to our newsletter</a></li>
                        </ul>
                    </nav>
                </header>

                <input type="radio" name="item" id="photo1" checked="checked">
                <input type="radio" name="item" id="photo2">
                <input type="radio" name="item" id="photo3">
                <input type="radio" name="item" id="photo4">
                <input type="radio" name="item" id="photo5">
                <input type="radio" name="item" id="photo6">
                <input type="radio" name="item" id="photo7">
                <input type="radio" name="item" id="photo8">

                <!-- Photo gallery -->
                <main class="photo-gallery">
                    <figure>
                        <img src="gallery-1.jpg" alt="Colorful clothing and accessories pinned on clothesline outside.">
                        <figcaption>Sun-soaked summer essentials hung out to dry under a bright blue sky.</figcaption>
                    </figure>

                    <figure>
                        <img src="gallery-2.jpg" alt="Person standing with clothing flying around them and draped across their body.">
                        <figcaption>Drowning in colour, one cozy knit layer at a time.</figcaption>
                    </figure>

                    <figure>
                        <img src="gallery-3.jpg" alt="Three people in colorful tights standing on stacks of books outside.">
                        <figcaption>Standing tall on stacks of rainbow-spined dictionaries in the grass.</figcaption>
                    </figure>

                    <figure>
                        <img src="gallery-4.jpg" alt="Woman standing in a white room with shopping bags and piles of clothing laying around." > 
                        <figcaption>Lost in a sea of shopping bags, clutching a paper fan.</figcaption>
                    </figure>

                    <figure>
                        <img src="gallery-5.jpg" alt="Vibrant clothing, shoes, and purses laying inside a closet.">
                        <figcaption>Vintage Chanel heels and designer bags arranged on pastel drawers.</figcaption>
                    </figure>

                    <figure>
                        <img src="gallery-6.jpg" alt="Clothing on wodden hangers being grabbed from a metal clothing rack.">
                        <figcaption>Hands sorting through a packed rack of wooden hangers and clothes.</figcaption>
                    </figure>

                    <figure>
                        <img src="gallery-7.jpg" alt="Red leather purse, wallet, sunglasses, and other various items displayed on the road.">
                        <figcaption>Red Jacquemus bag laid flat beside everyday essentials on pavement.</figcaption>
                    </figure>

                    <figure>
                        <img src="gallery-8.jpg" alt="Person lying on the ground with their legs on the couch, surrounded by accessories.">
                        <figcaption>Lazy afternoon on the floor, red socks up on the sofa.</figcaption>
                    </figure>
                </main>

                <nav class="gallery">
                    <label for="photo1">
                        <img src="gallery-1.jpg" alt="Colorful clothing and accessories pinned on clothesline outside." />
                    </label>

                    <label for="photo2">
                        <img src="gallery-2.jpg" alt="Person standing with clothing flying around them and draped across their body."/>
                    </label>

                    <label for="photo3">
                        <img src="gallery-3.jpg" alt="Three people in colorful tights standing on stacks of books outside." />
                    </label>

                    <label for="photo4">
                        <img src="gallery-4.jpg" alt="Woman standing in a white room with shopping bags and piles of clothing laying around."/>
                    </label>

                    <label for="photo5">
                        <img src="gallery-5.jpg" alt="Vibrant clothing, shoes, and purses laying inside a closet."/>
                    </label>

                    <label for="photo6">
                        <img src="gallery-6.jpg" alt="Clothing on wodden hangers being grabbed from a metal clothing rack."/>
                    </label>
                    
                    <label for="photo7">
                        <img src="gallery-7.jpg" alt="Red leather purse, wallet, sunglasses, and other various items displayed on the road."/>
                    </label>

                    <label for="photo8">
                        <img src="gallery-8.jpg" alt="Person lying on the ground with their legs on the couch, surrounded by accessories."/>
                    </label>

                <footer>
                    <p>All rights reserved</p>
                </footer>

            </div>
