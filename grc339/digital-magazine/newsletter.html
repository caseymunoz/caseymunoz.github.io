<!doctype html>
    <html lang="en">
        <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1"/>
            <link rel="stylesheet" type="text/css" href="style.css">
            <title>Worn Well</title>

            <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
            <meta http-equiv="Pragma" content="no-cache" />
            <meta http-equiv="Expires" content="0" />
            
            <!-- links to Adobe Fonts -->
            <link rel="stylesheet" href="https://use.typekit.net/muy3hit.css">
        </head>

        <body>
            <div class="newsletter-container">
            
                <header>
                    <h1>
                        <a href="index.html"><img src="WornWellLogo.svg" alt="Worn Well logo"></a>
                    </h1>

                    <nav>
                        <ul>
                            <li><a href="#">Editorial</a></li>
                            <li><a href="#">Vintage</a></li>
                            <li><a href="#">Sustainability</a></li>
                            <li><a href="#">Features</a></li>
                            <li><a href="#">About</a></li>
                            <li><a href="newsletter.html">Subscribe to our newsletter</a></li>
                        </ul>
                    </nav>
                </header>

                <main>
                    <section class="newsletter">
                        <h2>Subscribe to Worn Well</h2>

                        <p>Get the thrill of the thrift find delivered straight to your inbox.</p>

                        <ul>
                            <li>
                                <label for="name">Name</label>
                                <input id="name" type="text" name="name" placeholder="Your name">
                            </li>

                            <li>
                                <label for="email">Email Address</label>
                                <input id="email" type="email" name="email" placeholder="name@email.com">
                            </li>

                            <li>
                                <h3>What promotional material are you interested in?</h3>
                                <div class="options">
                                    <div class="option">
                                        <input id="thrift finds" type="checkbox" name="thrift finds">
                                        <label for="thrift finds">Thrift finds</label>
                                    </div>

                                    <div class="option">
                                        <input id="deals" type="checkbox" name="deals">
                                        <label for="deals">Deals</label>
                                    </div>

                                    <div class="option">
                                        <input id="testimonials" type="checkbox" name="testimonials">
                                        <label for="testimonials">Testimonials</label>
                                    </div>

                                    <div class="option">
                                        <input id="trends" type="checkbox" name="trends">
                                        <label for="testimonials">Trends</label>
                                    </div>
                                </div>
                            </li>

                            <li>
                                <h3>Email Frequency</h3>

                                <div class="options">
                                    <div class="option">
                                        <input id="weekly" type="radio" name="frequency" value="weekly">
                                        <label for="weekly">Weekly</label>
                                    </div>

                                    <div class="option">
                                        <input id="monthly" type="radio" name="frequency" value="monthly">
                                        <label for="monthly">Monthly</label>
                                    </div>

                                    <div class="option">
                                        <input id="annually" type="radio" name="frequency" value="annually">
                                        <label for="annually">Annually</label>
                                    </div>
                                </div>
                            </li>

                            <li>
                                <button type="submit">Subscribe</button>
                            </li>
                        </ul>
                    </section>                    
                </main>

                <footer>
                    <p>All rights reserved</p>
                </footer>

            </div>
        </body>
    </html>
